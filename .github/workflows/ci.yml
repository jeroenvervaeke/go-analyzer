name: CI

on:
  pull_request:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  test-go-model:
    name: Test go-model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-model

  test-go-analyzer-lib:
    name: Test go-analyzer (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-analyzer --lib

  test-fluent-api:
    name: Test fluent API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-analyzer --test fluent_api_test

  test-e2e-rewrite:
    name: Test e2e rewrite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-analyzer --test rewrite_e2e_test

  test-printer-roundtrip:
    name: Test printer roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-analyzer --test printer_roundtrip

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --example query_repo -p go-analyzer -- go-analyzer/tests/fixture_repo
      - run: cargo run --example add_string_methods -p go-analyzer -- go-analyzer/tests/fixture_repo --dry-run
      - run: cargo run --example delete_methods -p go-analyzer -- go-analyzer/tests/fixture_repo String --dry-run
      - run: cargo run --example combine_changes -p go-analyzer -- go-analyzer/tests/fixture_repo --dry-run
      - run: cargo run --example walk_and_print -p go-analyzer -- go-analyzer/tests/fixture_repo/beta/service.go

  test-corpus:
    name: Test corpus ($GOROOT/src)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p go-analyzer --test corpus_test -- --nocapture
        timeout-minutes: 10
